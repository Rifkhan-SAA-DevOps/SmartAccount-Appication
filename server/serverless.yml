service: smartledger-saas-api

frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  stage: ${opt:stage, 'dev'}
  memorySize: 1024
  timeout: 30
  environment:
    NODE_ENV: ${self:provider.stage}
    DATABASE_URL: ${env:DATABASE_URL}
    JWT_SECRET: ${env:JWT_SECRET}
    JWT_EXPIRES_IN: ${env:JWT_EXPIRES_IN, '7d'}
    CORS_ORIGIN: ${env:CORS_ORIGIN, '*'}
    APP_URL: ${env:APP_URL, ''}
    AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
    S3_UPLOAD_BUCKET: ${env:S3_UPLOAD_BUCKET, 'smartledger-documents-dev'}
    S3_PUBLIC_BASE_URL: ${env:S3_PUBLIC_BASE_URL, ''}
    S3_SIGNED_URL_EXPIRES_SECONDS: ${env:S3_SIGNED_URL_EXPIRES_SECONDS, '300'}
    MAX_UPLOAD_MB: ${env:MAX_UPLOAD_MB, '10'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource:
            - arn:aws:s3:::${env:S3_UPLOAD_BUCKET, 'smartledger-documents-dev'}/*
  httpApi:
    cors:
      allowedOrigins:
        - ${env:CORS_ORIGIN, '*'}
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS

functions:
  api:
    handler: src/lambda.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
      - httpApi:
          path: /
          method: ANY

plugins:
  - serverless-offline

package:
  patterns:
    - '!node_modules/.prisma/client/libquery_engine-*'
    - 'node_modules/.prisma/client/libquery_engine-rhel-*'
    - 'node_modules/@prisma/engines/**'
    - 'prisma/schema.prisma'
