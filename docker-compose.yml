services:
  postgres:
    image: postgres:16-alpine
    container_name: smartledger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartledger
    ports:
      - "5432:5432"
    volumes:
      - smartledger_pgdata:/var/lib/postgresql/data
volumes:
  smartledger_pgdata:
